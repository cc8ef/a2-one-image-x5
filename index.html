<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="index.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nikki Glitch</title>
</head>

<body>
  <!-- Image 1 
   css: aligning image, lowering opacity, text overlay
   manifesto: glitch as a choice
   connection: breaking the image and text as a way to provide an informal header-->
  <div class="alignment" id="opacity">
      <img src="images/nikki.jpg" alt="picture of Nikki, a brown tabby">
  </div>
  <div class="textposition">Nikki</div>

  <!-- Image 2 
   css: border w/ specifications, size adjustment
   manifesto: conventions
   connection:the image has the same elements applied to it as the others, but this looks the most normal. why? whose convention is that?-->
  <div class="borders"> 
    <img src="images/nikki.jpg" alt="picture of Nikki, a brown tabby" style="width:99%">
  </div>

  <!-- Image 3 
   css: image alignment, border w/ specifications, size adjustment
   manifesto: inperfections
   connection: this breaks the conventions above and opens up to imperfections-->
  <div class="alignment borders" id="background">
    <img src="images/nikki.jpg" alt="picture of Nikki, a brown tabby" style="width:50%; height:100%; ">
  </div>

  <!-- Image 4 
   css:size adjustment, filter
   manifesto: opening tech to the viewer
   connection: colour changing, something easily done with coloured pieces of glass, also done on a screen?-->
  <div class="resize" id="color">
    <img src="images/nikki.jpg" alt="picture of Nikki, a brown tabby">
  </div>

  <!-- Image 5 
   css: filter, scale3d
   manifesto: making the known strange
   connection: the image is still recognizable, but different-->
  <div class="bnw" id="scale"> 
    <img src="images/nikki.jpg" alt="picture of Nikki, a brown tabby">
  </div>
</body>

</html>
